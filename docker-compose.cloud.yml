services:
  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16
    container_name: lawqa_postgres
    restart: unless-stopped
    env_file:
      - ./数据库/.env.pg.cloud.example
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./数据库/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lawqa_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./数据库/.env.pg.cloud.example:/app/数据库/.env.pg:ro
      - ./数据库/.env.embedding.cloud.example:/app/数据库/.env.embedding:ro
    ports:
      - "8765:8765"

volumes:
  pgdata:
